name: Scheduled Hourly Ingestion

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # ----------------------------------------------------------------------
    # 1. SUNDAY OPENING WINDOW (UTC Time)
    # Fires every hour at minute 0, between 21:00 and 23:00, strictly on Sunday (0)
    # ----------------------------------------------------------------------
    - cron: '0 21-23 * * 0'

    # ----------------------------------------------------------------------
    # 2. STANDARD WEEKDAY RUNS (UTC Time)
    # Fires every hour at minute 0, all day long, Monday through Friday (1-5)
    # ----------------------------------------------------------------------
    - cron: '0 * * * 1-5'
    
  workflow_dispatch: # Keeps the manual trigger button available

jobs:
  incremental_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests yfinance

    - name: Execute Incremental Update
      run: python hourly_update.py
      env:
        TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

    - name: Commit and Push Delta Row Updates
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data/raw_hourly_history.csv
        git commit -m "Automated Ingestion: Appended scheduled hourly data rows [skip ci]" || echo "No fresh data packets detected to commit"
        git push
